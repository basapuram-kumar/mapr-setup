---
# Configure unsecure cluster

- name: Get Zookeeper IPs (fallback to FQDN if IP not available)
  set_fact: zoo_item={{ hostvars[item]['ansible_default_ipv4']['address'] | default(hostvars[item]['ansible_fqdn']) | default(item) }}
  with_items:
    - "{{ groups['mapr-zookeeper'] }}"
  register: zookeeper_hosts
- name: Make Zookeeper String
  set_fact: zookeeper_string={{ zookeeper_hosts.results | map(attribute='ansible_facts.zoo_item') | list | join(',')}}

- name: Get Zookeeper IPs with port (fallback to FQDN if IP not available)
  set_fact: zoo_item_withport={{ hostvars[item]['ansible_default_ipv4']['address'] | default(hostvars[item]['ansible_fqdn']) | default(item) }}:5181
  with_items:
    - "{{ groups['mapr-zookeeper'] }}"
  register: zookeeper_hosts_withport
- name: Make Zookeeper String with port
  set_fact: zookeeper_withport_string={{ zookeeper_hosts_withport.results | map(attribute='ansible_facts.zoo_item_withport') | list | join(',')}}

- name: Get CLDB IPs (fallback to FQDN if IP not available)
  set_fact: cldb_item={{ hostvars[item]['ansible_default_ipv4']['address'] | default(hostvars[item]['ansible_fqdn']) | default(item) }}
  with_items:
    - "{{ groups['mapr-cldb'] }}"
  register: cldb_hosts
- name: Make CLDB String
  set_fact: cldb_string={{ cldb_hosts.results | map(attribute='ansible_facts.cldb_item') | list | join(',')}}

- name: Get Resource Manager IPs (fallback to FQDN if IP not available)
  set_fact: resourcemanager_item={{ hostvars[item]['ansible_default_ipv4']['address'] | default(hostvars[item]['ansible_fqdn']) | default(item) }}
  with_items:
    - "{{ groups['mapr-resourcemanager'] }}"
  register: resourcemanager_hosts
  when: groups['mapr-resourcemanager'] is defined and groups['mapr-resourcemanager'] | length > 0
- name: Make Resource Manager String
  set_fact: resourcemanager_string={{ resourcemanager_hosts.results | map(attribute='ansible_facts.resourcemanager_item') | list | join(',')}}
  when: groups['mapr-resourcemanager'] is defined and groups['mapr-resourcemanager'] | length > 0

- name: Get History Server IPs (fallback to FQDN if IP not available)
  set_fact: historyserver_item={{ hostvars[item]['ansible_default_ipv4']['address'] | default(hostvars[item]['ansible_fqdn']) | default(item) }}
  with_items:
    - "{{ groups['mapr-historyserver'] }}"
  register: historyserver_hosts
  when: groups['mapr-historyserver'] is defined and groups['mapr-historyserver'] | length > 0
- name: Make History Server String
  set_fact: historyserver_string={{ historyserver_hosts.results | map(attribute='ansible_facts.historyserver_item') | list | join(',')}}
  when: groups['mapr-historyserver'] is defined and groups['mapr-historyserver'] | length > 0

- name: Set empty historyserver_string if no history servers defined
  set_fact: historyserver_string=""
  when: groups['mapr-historyserver'] is not defined or groups['mapr-historyserver'] | length == 0

- name: Debug Zookeeper
  debug: 
    msg: "Zookeeper String: {{ zookeeper_string }}"
- name: Debug CLDB
  debug: 
    msg: "CLDB String: {{ cldb_string }}"
- name: Debug History Server
  debug: 
    msg: "History Server String: {{ historyserver_string }}"


